name: Sync Fork with Upstream

on:
  schedule:
    - cron: '0 */5 * * *'
  workflow_dispatch:

concurrency:
  group: sync-upstream-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  issues: write

# ─────────────────────────────────────────────────────────────────────────────
# ENVIRONMENT DEFAULTS
# ─────────────────────────────────────────────────────────────────────────────
env:
  UPSTREAM_BRANCH: master
  ORIGIN_BRANCH:   master
  SYNC_LABEL:      upstream-sync-failure
  LOG_FILE:        /tmp/sync.log
  LOG_TAIL_LINES:  200      # Show last 200 lines in issue body

jobs:
  sync:
    name: "Sync Fork ← Upstream"
    runs-on: ubuntu-latest

    # ── Loop-protection: never re-trigger on our own bot push ─────────────────
    if: |
      github.actor != 'github-actions[bot]' &&
      !contains(github.event.head_commit.message, '[skip ci]')

    # ── Shared outputs so the failure-reporter step can read them ─────────────
    outputs:
      sync_failed:    ${{ steps.rebase.outputs.sync_failed }}
      push_skipped:   ${{ steps.push.outputs.push_skipped }}
      error_summary:  ${{ steps.rebase.outputs.error_summary }}

    steps:
      # ════════════════════════════════════════════════════════════════════════
      # 0. INITIALISE STRUCTURED LOG FILE
      # ════════════════════════════════════════════════════════════════════════
      - name: Initialise log file
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          cat > "${{ env.LOG_FILE }}" <<LOG
          ================================================================
           UPSTREAM SYNC STRUCTURED LOG
           Started : ${TIMESTAMP}
           Repo    : ${{ github.repository }}
           Branch  : ${{ env.ORIGIN_BRANCH }}
           Run ID  : ${{ github.run_id }}
          ================================================================
          LOG
          echo "✅ Log file initialised at ${{ env.LOG_FILE }}"

      # ════════════════════════════════════════════════════════════════════════
      # 1. CHECKOUT (full history)
      # ════════════════════════════════════════════════════════════════════════
      - name: Checkout repository — full history
        uses: actions/checkout@v4
        with:
          ref:         ${{ env.ORIGIN_BRANCH }}
          fetch-depth: 0

      # ════════════════════════════════════════════════════════════════════════
      # 2. GENERATE GITHUB APP TOKEN
      # ════════════════════════════════════════════════════════════════════════
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3
        with:
          app-id:      ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      # ════════════════════════════════════════════════════════════════════════
      # 3. CONFIGURE GIT
      # ════════════════════════════════════════════════════════════════════════
      - name: Configure git identity and authenticated remote
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          {
            echo ""
            echo "=== GIT CONFIGURATION ==="
          } >> "${{ env.LOG_FILE }}"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          REPO_URL="https://x-access-token:${APP_TOKEN}@github.com/${{ github.repository }}.git"
          git remote set-url origin "${REPO_URL}"

          {
            echo "  user.name  : github-actions[bot]"
            echo "  user.email : github-actions[bot]@users.noreply.github.com"
            echo "  origin url : https://x-access-token:***@github.com/${{ github.repository }}.git"
            echo "  status     : OK"
          } >> "${{ env.LOG_FILE }}"

          echo "✅ Git configured with App token authentication."

      # ════════════════════════════════════════════════════════════════════════
      # 4. ENSURE UPSTREAM REMOTE (idempotent)
      # ════════════════════════════════════════════════════════════════════════
      - name: Ensure upstream remote
        id: upstream-remote
        run: |
          {
            echo ""
            echo "=== UPSTREAM REMOTE ==="
          } >> "${{ env.LOG_FILE }}"

          if [ -z "${{ github.event.repository.parent.full_name }}" ]; then
            MSG="Repository has no upstream (not a fork or metadata unavailable)."
            echo "::error::${MSG}"
            echo "  ERROR: ${MSG}" >> "${{ env.LOG_FILE }}"
            exit 1
          fi

          UPSTREAM_URL="https://github.com/${{ github.event.repository.parent.full_name }}.git"

          if git remote get-url upstream &>/dev/null; then
            git remote set-url upstream "${UPSTREAM_URL}"
            echo "  action : updated existing remote" >> "${{ env.LOG_FILE }}"
            echo "ℹ️  'upstream' remote updated."
          else
            git remote add upstream "${UPSTREAM_URL}"
            echo "  action : added new remote" >> "${{ env.LOG_FILE }}"
            echo "➕ 'upstream' remote added."
          fi

          {
            echo "  url    : ${UPSTREAM_URL}"
            echo "  status : OK"
          } >> "${{ env.LOG_FILE }}"

      # ════════════════════════════════════════════════════════════════════════
      # 5. FETCH UPSTREAM (with retry + structured logging)
      # ════════════════════════════════════════════════════════════════════════
      - name: Fetch upstream
        id: fetch
        run: |
          {
            echo ""
            echo "=== FETCH ==="
            echo "  target : upstream/${{ env.UPSTREAM_BRANCH }}"
            echo "  time   : $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          } >> "${{ env.LOG_FILE }}"

          fetch_with_retry() {
            local attempt=1 max=3 delay=10 output exit_code

            while [ $attempt -le $max ]; do
              echo "🔄 Fetch attempt ${attempt}/${max}..."
              output=$(git fetch upstream "${{ env.UPSTREAM_BRANCH }}" --no-tags 2>&1)
              exit_code=$?

              echo "  [attempt ${attempt}] exit=${exit_code}" >> "${{ env.LOG_FILE }}"
              echo "${output}" >> "${{ env.LOG_FILE }}"

              if [ $exit_code -eq 0 ]; then
                echo "✅ Fetch succeeded on attempt ${attempt}."
                return 0
              fi

              echo "⚠️  Attempt ${attempt} failed. Retrying in ${delay}s..."
              sleep $delay
              delay=$((delay * 2))
              attempt=$((attempt + 1))
            done

            echo "  RESULT : FAILED after ${max} attempts" >> "${{ env.LOG_FILE }}"
            return 1
          }

          if ! fetch_with_retry; then
            echo "::error::git fetch failed after 3 retries — see sync.log for details."
            exit 1
          fi

          echo "  RESULT : OK" >> "${{ env.LOG_FILE }}"

      # ════════════════════════════════════════════════════════════════════════
      # 6. REBASE AND DETECT CHANGES (with structured logging)
      # ════════════════════════════════════════════════════════════════════════
      - name: Rebase onto upstream and detect changes
        id: rebase
        run: |
          {
            echo ""
            echo "=== REBASE ==="
            echo "  time : $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          } >> "${{ env.LOG_FILE }}"

          # Guard: re-attach if detached HEAD
          CURRENT_BRANCH=$(git symbolic-ref --short HEAD 2>/dev/null || echo "DETACHED")
          if [ "${CURRENT_BRANCH}" = "DETACHED" ]; then
            echo "⚠️  Detached HEAD detected — re-attaching to ${{ env.ORIGIN_BRANCH }}"
            git checkout "${{ env.ORIGIN_BRANCH }}"
            echo "  head-fix : re-attached to ${{ env.ORIGIN_BRANCH }}" >> "${{ env.LOG_FILE }}"
          fi

          BEFORE_SHA=$(git rev-parse HEAD)
          echo "  before-sha : ${BEFORE_SHA}" >> "${{ env.LOG_FILE }}"

          echo "🔀 Running: git pull upstream ${{ env.UPSTREAM_BRANCH }} --rebase"
          REBASE_OUTPUT=$(git pull upstream "${{ env.UPSTREAM_BRANCH }}" --rebase 2>&1)
          REBASE_EXIT=$?

          echo "${REBASE_OUTPUT}" >> "${{ env.LOG_FILE }}"

          if [ $REBASE_EXIT -ne 0 ]; then
            echo "  rebase-exit : ${REBASE_EXIT} — attempting --skip" >> "${{ env.LOG_FILE }}"
            echo "⚠️  Rebase conflict detected (exit ${REBASE_EXIT}). Attempting --skip..."

            SKIP_OUTPUT=$(git rebase --skip 2>&1)
            SKIP_EXIT=$?
            echo "${SKIP_OUTPUT}" >> "${{ env.LOG_FILE }}"

            if [ $SKIP_EXIT -ne 0 ]; then
              SUMMARY="Rebase failed and --skip also failed. Manual conflict resolution required."
              {
                echo "  skip-exit  : ${SKIP_EXIT}"
                echo "  RESULT     : FAILED"
                echo "  summary    : ${SUMMARY}"
              } >> "${{ env.LOG_FILE }}"

              echo "::error::${SUMMARY}"
              echo "sync_failed=true"    >> "$GITHUB_OUTPUT"
              echo "error_summary=${SUMMARY}" >> "$GITHUB_OUTPUT"
              exit 1
            fi

            echo "  skip-exit : 0 — conflicts skipped" >> "${{ env.LOG_FILE }}"
            echo "ℹ️  Conflicts skipped via --skip."
          fi

          AFTER_SHA=$(git rev-parse HEAD)
          echo "  after-sha : ${AFTER_SHA}" >> "${{ env.LOG_FILE }}"

          if [ "${BEFORE_SHA}" = "${AFTER_SHA}" ]; then
            echo "✅ Already in sync — no new commits from upstream."
            echo "  has-changes : false" >> "${{ env.LOG_FILE }}"
            echo "  RESULT      : OK (no changes)" >> "${{ env.LOG_FILE }}"
            echo "has_changes=false"  >> "$GITHUB_OUTPUT"
          else
            COUNT=$(git rev-list --count "${BEFORE_SHA}".."${AFTER_SHA}" 2>/dev/null || echo "?")
            echo "🆕 ${COUNT} new commit(s) from upstream."
            {
              echo "  has-changes  : true"
              echo "  new-commits  : ${COUNT}"
              echo "  RESULT       : OK"
            } >> "${{ env.LOG_FILE }}"
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

          echo "sync_failed=false" >> "$GITHUB_OUTPUT"

      # ════════════════════════════════════════════════════════════════════════
      # 7. PUSH TO ORIGIN (with retry + structured logging)
      # ════════════════════════════════════════════════════════════════════════
      - name: Push to origin
        id: push
        if: steps.rebase.outputs.has_changes == 'true'
        run: |
          {
            echo ""
            echo "=== PUSH ==="
            echo "  target : origin/${{ env.ORIGIN_BRANCH }}"
            echo "  time   : $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          } >> "${{ env.LOG_FILE }}"

          push_with_retry() {
            local attempt=1 max=3 delay=8 output exit_code

            while [ $attempt -le $max ]; do
              echo "🚀 Push attempt ${attempt}/${max}..."
              output=$(git push origin "${{ env.ORIGIN_BRANCH }}" 2>&1)
              exit_code=$?

              echo "  [attempt ${attempt}] exit=${exit_code}" >> "${{ env.LOG_FILE }}"
              echo "${output}" >> "${{ env.LOG_FILE }}"

              if [ $exit_code -eq 0 ]; then
                echo "✅ Push succeeded on attempt ${attempt}."
                return 0
              fi

              echo "⚠️  Push attempt ${attempt} failed. Retrying in ${delay}s..."
              sleep $delay
              delay=$((delay * 2))
              attempt=$((attempt + 1))
            done

            echo "  RESULT : FAILED after ${max} attempts" >> "${{ env.LOG_FILE }}"
            return 1
          }

          if ! push_with_retry; then
            echo "::error::git push failed after 3 retries — see sync.log for details."
            echo "push_skipped=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "  RESULT : OK" >> "${{ env.LOG_FILE }}"
          echo "push_skipped=false" >> "$GITHUB_OUTPUT"
          echo "✅ Sync complete — changes pushed to origin/${{ env.ORIGIN_BRANCH }}."

      - name: Log — fork already in sync
        if: steps.rebase.outputs.has_changes == 'false'
        run: |
          echo "ℹ️  Fork is already in sync with upstream. Push skipped."
          echo "push_skipped=true" >> "$GITHUB_OUTPUT"

      # ════════════════════════════════════════════════════════════════════════
      # 8. FINALISE LOG
      # ════════════════════════════════════════════════════════════════════════
      - name: Finalise log file
        if: always()
        run: |
          {
            echo ""
            echo "================================================================"
            echo " SYNC COMPLETE"
            echo " Finished : $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
            echo "================================================================"
          } >> "${{ env.LOG_FILE }}"
          echo "📄 Final log size: $(wc -c < "${{ env.LOG_FILE }}") bytes"

      # ════════════════════════════════════════════════════════════════════════
      # 9. UPLOAD LOG ARTIFACT (always, even on failure)
      # ════════════════════════════════════════════════════════════════════════
      - name: Upload sync log as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sync-log-${{ github.run_id }}
          path: ${{ env.LOG_FILE }}
          retention-days: 14

      # ════════════════════════════════════════════════════════════════════════
      # 10. ENTERPRISE FAILURE REPORTER
      #     — Smart deduplication: comment on existing issue, else create new
      # ════════════════════════════════════════════════════════════════════════
      - name: "Failure Reporter — create or update GitHub Issue"
        if: failure()
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          # ── helpers ──────────────────────────────────────────────────────────
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          LABEL="${{ env.SYNC_LABEL }}"

          # ── determine which step failed ───────────────────────────────────────
          if   [ "${{ steps.fetch.outcome }}"  = "failure" ]; then
            FAILED_STEP="Fetch Upstream"
            SHORT_SUMMARY="git fetch from upstream failed after 3 retries with exponential back-off."
          elif [ "${{ steps.rebase.outcome }}" = "failure" ]; then
            FAILED_STEP="Rebase / Sync"
            SHORT_SUMMARY="${{ steps.rebase.outputs.error_summary }}"
            [ -z "${SHORT_SUMMARY}" ] && SHORT_SUMMARY="git rebase failed and --skip could not resolve conflicts."
          elif [ "${{ steps.push.outcome }}"   = "failure" ]; then
            FAILED_STEP="Push to Origin"
            SHORT_SUMMARY="git push to origin/${{ env.ORIGIN_BRANCH }} failed after 3 retries."
          else
            FAILED_STEP="Unknown Step"
            SHORT_SUMMARY="An unidentified workflow step failed. Inspect the run logs for details."
          fi

          echo "::group::Failure Reporter"
          echo "Failed step  : ${FAILED_STEP}"
          echo "Short summary: ${SHORT_SUMMARY}"

          # ── read + truncate structured log (last 200 lines) ──────────────────
          RAW_LOG=""
          if [ -f "${{ env.LOG_FILE }}" ]; then
            TOTAL_LINES=$(wc -l < "${{ env.LOG_FILE }}")
            TAIL_LINES="${{ env.LOG_TAIL_LINES }}"
            echo "Log file: ${TOTAL_LINES} total lines"

            if [ "${TOTAL_LINES}" -gt "${TAIL_LINES}" ]; then
              TRUNCATED_NOTICE="[LOG TRUNCATED — showing last ${TAIL_LINES} of ${TOTAL_LINES} lines]"
              RAW_LOG="${TRUNCATED_NOTICE}"$'\n'"$(tail -n "${TAIL_LINES}" "${{ env.LOG_FILE }}")"
              echo "⚠️  Log trimmed to last ${TAIL_LINES} lines."
            else
              RAW_LOG=$(cat "${{ env.LOG_FILE }}")
            fi
          else
            RAW_LOG="Log file not found at ${{ env.LOG_FILE }}."
          fi

          # ── ensure the dedup label exists ─────────────────────────────────────
          gh label create "${LABEL}" \
            --description "Automated label for upstream sync failures" \
            --color "B60205" \
            --repo "${{ github.repository }}" 2>/dev/null \
            && echo "✅ Label '${LABEL}' created." \
            || echo "ℹ️  Label '${LABEL}' already exists."

          # ── search for an existing OPEN issue with this label ─────────────────
          EXISTING_ISSUE_NUMBER=$(gh issue list \
            --repo "${{ github.repository }}" \
            --label "${LABEL}" \
            --state open \
            --json number \
            --jq '.[0].number // empty' 2>/dev/null || true)

          # ── branch: comment vs create ─────────────────────────────────────────
          # NOTE: Markdown is written to temp files and passed via --body-file.
          # This avoids embedding pipe characters (|) directly in the YAML scalar,
          # which confuses YAML parsers into treating them as block indicators.
          if [ -n "${EXISTING_ISSUE_NUMBER}" ]; then
            # ── COMMENT ON EXISTING ISSUE ─────────────────────────────────────
            echo "💬 Open issue #${EXISTING_ISSUE_NUMBER} found — appending comment."

            COMMENT_FILE=$(mktemp /tmp/comment_body.XXXXXX.md)
            {
              printf '## \360\237\224\201 Recurring Failure \342\200\224 %s\n\n' "${TIMESTAMP}"
              printf 'Failed Step : `%s`\n' "${FAILED_STEP}"
              printf 'Run ID      : [#${{ github.run_id }}](%s)\n' "${RUN_URL}"
              printf 'Branch      : `${{ env.ORIGIN_BRANCH }}`\n'
              printf 'Timestamp   : `%s`\n' "${TIMESTAMP}"
              printf '\n### Error Summary\n\n%s\n' "${SHORT_SUMMARY}"
              printf '\n### Structured Logs\n\n```text\n%s\n```\n' "${RAW_LOG}"
              printf '\n---\n'
              printf '> \360\237\224\227 [View full workflow run](%s) \302\267 \360\237\223\245 [Download sync log artifact](%s#artifacts)\n' \
                "${RUN_URL}" "${RUN_URL}"
            } > "${COMMENT_FILE}"

            gh issue comment "${EXISTING_ISSUE_NUMBER}" \
              --repo "${{ github.repository }}" \
              --body-file "${COMMENT_FILE}"

            rm -f "${COMMENT_FILE}"
            echo "✅ Comment added to issue #${EXISTING_ISSUE_NUMBER}."

          else
            # ── CREATE NEW ISSUE ──────────────────────────────────────────────
            echo "🆕 No open issue found — creating a new one."

            ISSUE_FILE=$(mktemp /tmp/issue_body.XXXXXX.md)
            {
              printf '## \342\235\214 Sync Failure Report\n\n'
              printf 'Branch    : `${{ env.ORIGIN_BRANCH }}`\n'
              printf 'Run ID    : [#${{ github.run_id }}](%s)\n' "${RUN_URL}"
              printf 'Workflow  : `${{ github.workflow }}`\n'
              printf 'Failed    : `%s`\n' "${FAILED_STEP}"
              printf 'Time      : `%s`\n' "${TIMESTAMP}"
              printf 'Upstream  : `${{ github.event.repository.parent.full_name }}`\n'
              printf '\n---\n\n### Error Summary\n\n%s\n' "${SHORT_SUMMARY}"
              printf '\n---\n\n### Logs\n\n```text\n%s\n```\n' "${RAW_LOG}"
              printf '\n---\n\n### Next Steps\n\n'
              printf '1. Review the [workflow run](%s) for the full context.\n' "${RUN_URL}"
              printf '2. Download the **sync log artifact** from the run page for the complete untruncated log.\n'
              printf '3. If this is a rebase conflict, manually resolve it on `${{ env.ORIGIN_BRANCH }}` and re-run.\n'
              printf '4. Close this issue once the sync is confirmed healthy.\n\n'
              printf '> _This issue is managed automatically. Subsequent failures are appended as comments._\n'
              printf '> _Label: `${{ env.SYNC_LABEL }}`_\n'
            } > "${ISSUE_FILE}"

            NEW_ISSUE_URL=$(gh issue create \
              --repo  "${{ github.repository }}" \
              --title "[Sync Failure] Upstream sync failed on ${{ env.ORIGIN_BRANCH }}" \
              --body-file "${ISSUE_FILE}" \
              --label "${LABEL}")

            rm -f "${ISSUE_FILE}"
            echo "✅ Created new issue: ${NEW_ISSUE_URL}"
          fi

          echo "::endgroup::"
